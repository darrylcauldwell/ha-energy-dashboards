# Octopus Monthly Insight Dashboard
#
# Lovelace dashboard for monthly electricity billing analysis using the
# tariff_comparison sensor from the custom ha-octopus-energy integration.
#
# Entity IDs use ACCOUNT_tariff_comparison placeholder which is replaced
# by scripts/deploy_energy_bills.py at deploy time.
#
# Cards:
#   1. Optimal Tariff (Month)
#   2. Optimal Tariff (Six-Month)
#   3. Monthly Summary
#   4. Daily Cost Breakdown
#   5. Trends
#
# NOTE: Only electricity import data is available historically via tariff
# comparison. Export revenue and gas costs have no monthly history source.

views:
  - title: Octopus Monthly Insight
    path: energy-bills
    icon: mdi:receipt-text
    cards:
      # ── Card 1: Cheapest Tariff? Last Month ──────────────────────────────
      - type: markdown
        content: |
          ### Optimal Tariff (Month)
          {%- set tc = state_attr('sensor.octopus_energy_ACCOUNT_tariff_comparison', 'tariffs') -%}
          {%- if tc -%}
          {%- set ns = namespace(current=none, last_idx=-1) -%}
          {%- for t in tc -%}
          {%- if t.is_current -%}{%- set ns.current = t -%}{%- endif -%}
          {%- endfor -%}
          {%- if ns.current and ns.current.months | length > 1 -%}
          {%- set ns.last_idx = ns.current.months | length - 2 -%}
          {%- set last_month = ns.current.months[ns.last_idx] -%}
          {%- set ns2 = namespace(tariffs=[], cheapest_cost=999, cheapest_name='', current_cost=0) -%}
          {%- for t in tc -%}
          {%- if t.months | length > ns.last_idx -%}
          {%- set m = t.months[ns.last_idx] -%}
          {%- if m.total_cost < ns2.cheapest_cost -%}
          {%- set ns2.cheapest_cost = m.total_cost -%}
          {%- set ns2.cheapest_name = t.display_name -%}
          {%- endif -%}
          {%- if t.is_current -%}{%- set ns2.current_cost = m.total_cost -%}{%- endif -%}
          {%- endif -%}
          {%- endfor -%}
          {%- set saving = ns2.current_cost - ns2.cheapest_cost -%}
          {%- set on_cheapest = saving <= 0.01 %}
          ### {{ last_month.month }}
          {%- if on_cheapest %}

          <font color="green">**Yes — you were on the cheapest tariff!**</font>
          {%- else %}

          <font color="red">**No — you could have saved £{{ '%.2f' | format(saving) }}**</font> on **{{ ns2.cheapest_name }}**
          {%- endif %}

          | Tariff | Cost | vs You |
          |--------|----:|----:|
          {%- for t in tc -%}
          {%- if t.months | length > ns.last_idx -%}
          {%- set m = t.months[ns.last_idx] -%}
          {%- set diff = m.total_cost - ns2.current_cost -%}
          {%- if t.is_current %}
          | **{{ t.display_name }}** ★ | **£{{ '%.2f' | format(m.total_cost) }}** | — |
          {%- elif diff > 0 %}
          | {{ t.display_name }} | £{{ '%.2f' | format(m.total_cost) }} | <font color="green">+£{{ '%.2f' | format(diff) }}</font> |
          {%- elif diff < 0 %}
          | {{ t.display_name }} | £{{ '%.2f' | format(m.total_cost) }} | <font color="red">{{ '%.2f' | format(diff) }}</font> |
          {%- else %}
          | {{ t.display_name }} | £{{ '%.2f' | format(m.total_cost) }} | £0.00 |
          {%- endif -%}
          {%- endif -%}
          {%- endfor %}

          *Based on {{ last_month.days_with_data }} days of data ({{ last_month.consumption_kwh | round(0) | int }} kWh consumed)*
          {%- elif ns.current and ns.current.months | length == 1 %}
          *Only one month of data available — need at least two months for last-month comparison.*
          {%- else %}
          *No monthly data available yet.*
          {%- endif -%}
          {%- else %}
          *Tariff comparison data not available.*
          {%- endif %}

      # ── Card 2: Cheapest Tariff? Last 6 Months ───────────────────────────
      - type: markdown
        content: |
          ### Optimal Tariff (Six-Month)
          {%- set tc = state_attr('sensor.octopus_energy_ACCOUNT_tariff_comparison', 'tariffs') -%}
          {%- if tc -%}
          {%- set ns = namespace(current=none) -%}
          {%- for t in tc -%}
          {%- if t.is_current -%}{%- set ns.current = t -%}{%- endif -%}
          {%- endfor -%}
          {%- if ns.current and ns.current.months | length > 1 -%}
          {%- set all_months = ns.current.months -%}
          {%- set end_idx = all_months | length - 1 -%}
          {%- set start_idx = [end_idx - 6, 0] | max -%}
          {%- set months_slice = all_months[start_idx:end_idx] -%}
          {%- set month_count = months_slice | length -%}
          {%- if month_count > 0 -%}
          {%- set ns2 = namespace(current_total=0, cheapest_total=0, cheapest_wins=0, current_wins=0) %}
          Your tariff: **{{ ns.current.display_name }}**

          | Month | You Paid | Cheapest | Diff | Optimal Tariff |
          |-------|----:|----:|----:|-----|
          {%- for i in range(month_count) -%}
          {%- set abs_idx = start_idx + i -%}
          {%- set cm = months_slice[i] -%}
          {%- set current_cost = cm.total_cost -%}
          {%- set ns3 = namespace(cheapest=current_cost, cheapest_name=ns.current.display_name) -%}
          {%- for t in tc -%}
          {%- if not t.is_current and t.months | length > abs_idx -%}
          {%- set alt_cost = t.months[abs_idx].total_cost -%}
          {%- if alt_cost < ns3.cheapest -%}
          {%- set ns3.cheapest = alt_cost -%}
          {%- set ns3.cheapest_name = t.display_name -%}
          {%- endif -%}
          {%- endif -%}
          {%- endfor -%}
          {%- set diff = current_cost - ns3.cheapest -%}
          {%- set ns2.current_total = ns2.current_total + current_cost -%}
          {%- set ns2.cheapest_total = ns2.cheapest_total + ns3.cheapest -%}
          {%- if diff > 0.01 -%}{%- set ns2.cheapest_wins = ns2.cheapest_wins + 1 -%}
          {%- else -%}{%- set ns2.current_wins = ns2.current_wins + 1 -%}{%- endif %}
          | {{ cm.month }} | £{{ '%.2f' | format(current_cost) }} | £{{ '%.2f' | format(ns3.cheapest) }} | {%- if diff > 0.01 %} <font color="red">+£{{ '%.2f' | format(diff) }}</font>{%- elif diff < -0.01 %} <font color="green">-£{{ '%.2f' | format(diff | abs) }}</font>{%- else %} £0.00{%- endif %} | {{ ns3.cheapest_name }} |
          {%- endfor -%}
          {%- set total_diff = ns2.current_total - ns2.cheapest_total %}
          | **Total** | **£{{ '%.2f' | format(ns2.current_total) }}** | **£{{ '%.2f' | format(ns2.cheapest_total) }}** | {%- if total_diff > 0.01 %} **<font color="red">+£{{ '%.2f' | format(total_diff) }}</font>**{%- elif total_diff < -0.01 %} **<font color="green">-£{{ '%.2f' | format(total_diff | abs) }}</font>**{%- else %} **£0.00**{%- endif %} | |

          {%- if ns2.current_wins >= month_count %}
          <font color="green">**You were on the cheapest tariff every month.**</font>
          {%- elif ns2.current_wins > ns2.cheapest_wins %}
          <font color="green">**Cheapest {{ ns2.current_wins }}/{{ month_count }} months.**</font> An alternative was cheaper {{ ns2.cheapest_wins }} month{{ 's' if ns2.cheapest_wins != 1 }}.
          {%- elif ns2.cheapest_wins > 0 %}
          <font color="red">**An alternative was cheaper {{ ns2.cheapest_wins }}/{{ month_count }} months**</font> — £{{ '%.2f' | format(total_diff) }} overpaid.
          {%- endif %}
          {%- else %}
          *Not enough complete months for 6-month comparison.*
          {%- endif -%}
          {%- else %}
          *Need at least 2 months of data.*
          {%- endif -%}
          {%- else %}
          *Tariff comparison data not available.*
          {%- endif %}

      # ── Card 3: Monthly Summary ────────────────────────────────────────────
      - type: markdown
        content: |
          ### Monthly Summary
          {%- set tc = state_attr('sensor.octopus_energy_ACCOUNT_tariff_comparison', 'tariffs') -%}
          {%- if tc -%}
          {%- set ns = namespace(current=none) -%}
          {%- for t in tc -%}
          {%- if t.is_current -%}{%- set ns.current = t -%}{%- endif -%}
          {%- endfor -%}
          {%- if ns.current and ns.current.months | length > 0 -%}
          {%- set months = ns.current.months -%}
          {%- set ns2 = namespace(min_total=999, max_total=0, sum_kwh=0, sum_cost=0, total_days=0) -%}
          {%- for m in months -%}
          {%- if m.total_cost < ns2.min_total %}{% set ns2.min_total = m.total_cost %}{% endif -%}
          {%- if m.total_cost > ns2.max_total %}{% set ns2.max_total = m.total_cost %}{% endif -%}
          {%- set ns2.sum_kwh = ns2.sum_kwh + m.consumption_kwh -%}
          {%- set ns2.sum_cost = ns2.sum_cost + m.total_cost -%}
          {%- set ns2.total_days = ns2.total_days + m.days_with_data -%}
          {%- endfor -%}
          {%- set spread = ns2.max_total - ns2.min_total -%}
          {%- set green_thresh = ns2.min_total + spread * 0.33 -%}
          {%- set red_thresh = ns2.min_total + spread * 0.66 %}
          **{{ ns.current.display_name }}** (current tariff)

          | Month | Usage (kWh) | Energy Cost | Standing | Total | Daily Avg |
          |-------|----:|----:|----:|----:|----:|
          {%- for m in months %}
          {%- set daily_avg = m.total_cost / m.days_with_data if m.days_with_data > 0 else 0 -%}
          {%- set partial = m.days_with_data < m.days_in_month -%}
          {%- set month_label = m.month ~ ' (' ~ m.days_with_data ~ ' of ' ~ m.days_in_month ~ ' days)' if partial else m.month -%}
          {%- if partial and m == months[-1] -%}
          {%- set projected = daily_avg * m.days_in_month -%}
          {%- set month_label = m.month ~ ' (' ~ m.days_with_data ~ '/' ~ m.days_in_month ~ 'd)' -%}
          | {{ month_label }} | {{ '%.0f' | format(m.consumption_kwh) }} | £{{ '%.2f' | format(m.unit_cost) }} | £{{ '%.2f' | format(m.standing_cost) }} | {%- if m.total_cost <= green_thresh %} <font color="green">£{{ '%.2f' | format(m.total_cost) }}</font>{%- elif m.total_cost >= red_thresh %} <font color="red">£{{ '%.2f' | format(m.total_cost) }}</font>{%- else %} <font color="orange">£{{ '%.2f' | format(m.total_cost) }}</font>{%- endif %} | £{{ '%.2f' | format(daily_avg) }} |
          | *→ projected* | | | | *£{{ '%.2f' | format(projected) }}* | |
          {%- else %}
          | {{ month_label }} | {{ '%.0f' | format(m.consumption_kwh) }} | £{{ '%.2f' | format(m.unit_cost) }} | £{{ '%.2f' | format(m.standing_cost) }} | {%- if m.total_cost <= green_thresh %} <font color="green">£{{ '%.2f' | format(m.total_cost) }}</font>{%- elif m.total_cost >= red_thresh %} <font color="red">£{{ '%.2f' | format(m.total_cost) }}</font>{%- else %} <font color="orange">£{{ '%.2f' | format(m.total_cost) }}</font>{%- endif %} | £{{ '%.2f' | format(daily_avg) }} |
          {%- endif -%}
          {%- endfor %}
          | **Total** | **{{ '%.0f' | format(ns2.sum_kwh) }}** | | | **£{{ '%.2f' | format(ns2.sum_cost) }}** | **£{{ '%.2f' | format(ns2.sum_cost / ns2.total_days if ns2.total_days > 0 else 0) }}** |
          {%- else %}
          *No monthly data available yet.*
          {%- endif -%}
          {%- else %}
          *Tariff comparison data not available.*
          {%- endif %}

      # ── Card 4: Daily Cost Breakdown ──────────────────────────────────
      - type: markdown
        content: |
          {%- set tc = state_attr('sensor.octopus_energy_ACCOUNT_tariff_comparison', 'tariffs') -%}
          {%- if tc -%}
          {%- set ns = namespace(current=none) -%}
          {%- for t in tc -%}
          {%- if t.is_current -%}{%- set ns.current = t -%}{%- endif -%}
          {%- endfor -%}
          {%- if ns.current and ns.current.months | length > 0 -%}
          {%- set ns_m = namespace(month=none) -%}
          {%- for m in ns.current.months | reverse -%}
          {%- if ns_m.month is none and m.slots is defined and m.slots | length > 0 and m.days_with_data == m.days_in_month -%}
          {%- set ns_m.month = m -%}
          {%- endif -%}
          {%- endfor -%}
          {%- if ns_m.month is none -%}
          {%- for m in ns.current.months | reverse -%}
          {%- if ns_m.month is none and m.slots is defined and m.slots | length > 0 -%}
          {%- set ns_m.month = m -%}
          {%- endif -%}
          {%- endfor -%}
          {%- endif -%}
          {%- set month = ns_m.month -%}
          {%- if month is not none -%}
          {%- set sorted_slots = month.slots | sort(attribute='start') -%}
          {%- set ns2 = namespace(days=[], min_cost=999, max_cost=0) -%}
          {%- set ns_pre = namespace(day='', day_cost=0) -%}
          {%- for s in sorted_slots -%}
          {%- set d = s.start[:10] -%}
          {%- if d != ns_pre.day -%}
          {%- if ns_pre.day != '' -%}
          {%- set ns2.days = ns2.days + [ns_pre.day] -%}
          {%- if ns_pre.day_cost < ns2.min_cost -%}{%- set ns2.min_cost = ns_pre.day_cost -%}{%- endif -%}
          {%- if ns_pre.day_cost > ns2.max_cost -%}{%- set ns2.max_cost = ns_pre.day_cost -%}{%- endif -%}
          {%- endif -%}
          {%- set ns_pre.day = d -%}
          {%- set ns_pre.day_cost = 0 -%}
          {%- endif -%}
          {%- set ns_pre.day_cost = ns_pre.day_cost + s.cost -%}
          {%- endfor -%}
          {%- if ns_pre.day != '' -%}
          {%- set ns2.days = ns2.days + [ns_pre.day] -%}
          {%- if ns_pre.day_cost < ns2.min_cost -%}{%- set ns2.min_cost = ns_pre.day_cost -%}{%- endif -%}
          {%- if ns_pre.day_cost > ns2.max_cost -%}{%- set ns2.max_cost = ns_pre.day_cost -%}{%- endif -%}
          {%- endif -%}
          {%- set spread = ns2.max_cost - ns2.min_cost -%}
          {%- set green_thresh = ns2.min_cost + spread * 0.33 -%}
          {%- set red_thresh = ns2.min_cost + spread * 0.66 -%}
          {%- set month_names = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'] -%}
          {%- set month_name = month_names[month.month.split('-')[1] | int - 1] %}
          ### Daily Cost Breakdown — {{ month_name }} {{ month.month.split('-')[0] }}

          | Date | kWh | Avg Rate | Cost |
          |------|----:|----:|----:|
          {%- for day in ns2.days | sort -%}
          {%- set ns3 = namespace(kwh=0, cost=0, rate_sum=0, count=0) -%}
          {%- for s in sorted_slots -%}
          {%- if s.start[:10] == day -%}
          {%- set ns3.kwh = ns3.kwh + s.consumption_kwh -%}
          {%- set ns3.cost = ns3.cost + s.cost -%}
          {%- set ns3.rate_sum = ns3.rate_sum + s.rate -%}
          {%- set ns3.count = ns3.count + 1 -%}
          {%- endif -%}
          {%- endfor -%}
          {%- set avg_r = ns3.rate_sum / ns3.count if ns3.count > 0 else 0 %}
          | {{ day }} | {{ '%.1f' | format(ns3.kwh) }} | {{ '%.1f' | format(avg_r) }}p | {%- if ns3.cost >= red_thresh %} <font color="red">£{{ '%.2f' | format(ns3.cost) }}</font>{%- elif ns3.cost <= green_thresh %} <font color="green">£{{ '%.2f' | format(ns3.cost) }}</font>{%- else %} <font color="orange">£{{ '%.2f' | format(ns3.cost) }}</font>{%- endif %} |
          {%- endfor %}
          | **Total** | **{{ '%.1f' | format(month.consumption_kwh) }}** | | **£{{ '%.2f' | format(month.total_cost) }}** |

          *<font color="green">Green</font> = cheapest third, <font color="orange">Orange</font> = middle, <font color="red">Red</font> = most expensive third*
          *Cross-reference total with your Octopus bill for {{ month.month }}*
          {%- else %}
          *No half-hourly slot data available yet. Data backfills over several cycles after restart (~10 min per cycle, 3 chunks of 14 days each).*
          {%- endif -%}
          {%- endif -%}
          {%- else %}
          *Tariff comparison data not available.*
          {%- endif %}

      # ── Card 5: Trends ───────────────────────────────────────────
      - type: markdown
        content: |
          ### Trends
          {%- set tc = state_attr('sensor.octopus_energy_ACCOUNT_tariff_comparison', 'tariffs') -%}
          {%- if tc -%}
          {%- set ns = namespace(current=none) -%}
          {%- for t in tc -%}
          {%- if t.is_current -%}{%- set ns.current = t -%}{%- endif -%}
          {%- endfor -%}
          {%- if ns.current and ns.current.months | length > 0 -%}
          {%- set months = ns.current.months %}

          | Month | kWh Change | Cost Change |
          |-------|----:|----:|
          {%- for m in months -%}
          {%- if loop.first %}
          | {{ m.month }} | — | — |
          {%- else -%}
          {%- set prev = months[loop.index0 - 1] -%}
          {%- set kwh_delta = m.consumption_kwh - prev.consumption_kwh -%}
          {%- set cost_delta = m.total_cost - prev.total_cost -%}
          {%- set kwh_sign = '+' if kwh_delta >= 0 else '' -%}
          {%- set cost_sign = '+' if cost_delta >= 0 else '' %}
          | {{ m.month }} | {%- if kwh_delta > 0 %} <font color="red">{{ kwh_sign }}{{ '%.0f' | format(kwh_delta) }}</font>{%- elif kwh_delta < 0 %} <font color="green">{{ kwh_sign }}{{ '%.0f' | format(kwh_delta) }}</font>{%- else %} 0{%- endif %} | {%- if cost_delta > 0 %} <font color="red">{{ cost_sign }}£{{ '%.2f' | format(cost_delta) }}</font>{%- elif cost_delta < 0 %} <font color="green">{{ cost_sign }}£{{ '%.2f' | format(cost_delta) }}</font>{%- else %} £0.00{%- endif %} |
          {%- endif -%}
          {%- endfor %}
          {%- else %}
          *No monthly data available yet.*
          {%- endif -%}
          {%- else %}
          *Tariff comparison data not available.*
          {%- endif %}
